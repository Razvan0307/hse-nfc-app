<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scriere NFC</title>

    <style>
        body {
            margin: 0;
            background: #f0f2f5;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #1d4ed8;
            font-weight: 700;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 18px;
            resize: none;
            margin-top: 10px;
            box-sizing: border-box;
            display: block;   /* ✅ împiedică ieșirea din card */
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #0f7f38; }

        .btn-red { background: #dc2626; }
        .btn-red:hover { background: #a81e1e; }

        .btn-gray { background: #6b7280; }
        .btn-gray:hover { background: #4b5563; }

        a { text-decoration: none; display: block; }

        #statusBox {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>✍️ Scriere Tag NCR</h1>

        <div class="card">
            <p style="font-size:18px;">
                Introduceți textul care va fi scris pe tag-ul NFC:
            </p>

            <!-- ✅ TEXTAREA CORECT POZIȚIONATĂ -->
            <textarea id="nfcText" rows="3" placeholder="Ex: HAM_001, LOC_Magazin, KIT_015"></textarea>

            <!-- ✅ BUTON SCRIERE -->
            <button id="writeButton" class="btn btn-green">
                ✅ Scrie pe tag NCR
            </button>

            <!-- ✅ BUTON ȘTERGERE -->
            <button id="eraseButton" class="btn btn-red">
                🧹 Șterge complet tag-ul
            </button>

            <!-- ✅ ÎNAPOI LA SCANARE -->
            <a href="index.html">
                <button class="btn btn-gray">⬅ Înapoi la scanare</button>
            </a>
        </div>

        <!-- ✅ Aici apare mesajul "Apropie telefonul..." -->
        <div id="statusBox"></div>

        <p style="text-align:center; color:#6b7280; font-size:14px; margin-top:20px;">
            *Scrierea și ștergerea NFC funcționează doar pe Android + Chrome*
        </p>

    </div>

    <!-- ✅ SCRIPT CORECT, FĂRĂ TEXT ÎN PAGINĂ -->
    <script src="write.js"></script>

</body>
</html>
