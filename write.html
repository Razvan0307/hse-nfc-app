<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scriere NFC</title>

    <style>
        /* ✅ FUNDAL MODERN */
        body {
            margin: 0;
            background: linear-gradient(135deg,#ffffff,#e8e8ff,#c7ccff,#b79dff,#7e67ff);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        @keyframes gradientFlow {
            0% {background-position:0% 50%;}
            50% {background-position:100% 50%;}
            100% {background-position:0% 50%;}
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 20px;
        }

        /* ✅ TITLU MODERN */
        h1 {
            text-align: center;
            font-size: 34px;
            color: #1d4ed8;
            font-weight: 900;
            margin-top: 25px;
            text-shadow: 0 0 10px rgba(255,255,255,.7);
            animation: fadeIn .5s ease-out;
        }

        /* ✅ CARD PREMIUM + SLIDE-UP */
        .card {
            background: rgba(255,255,255,0.88);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-top: 20px;

            animation: slideUp .35s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {opacity:0; transform: translateY(25px);}
            to   {opacity:1; transform: translateY(0);}
        }

        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #ccc;
            font-size: 18px;
            resize: none;
            margin-top: 10px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* ✅ BUTOANE MODERNE */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 15px;
            color: white;
            font-weight: 700;
            transition: .15s ease;
        }

        .btn:active { transform: scale(0.95); }

        .btn-green { background: #16a34a; box-shadow:0 4px 14px rgba(22,163,74,.35); }
        .btn-red   { background: #dc2626; box-shadow:0 4px 14px rgba(220,38,38,.35); }
        .btn-gray  { background: #6b7280; box-shadow:0 4px 14px rgba(107,114,128,.35); }

        a { text-decoration: none; }

        /* ✅ LOADER */
        #statusBox {
            margin-top: 22px;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color:#1e40af;
        }

        .loader {
            width: 38px;
            height: 38px;
            border: 4px solid #1e40af;
            border-top-color: transparent;
            border-radius: 50%;
            margin: 10px auto;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            from { transform:rotate(0deg); }
            to   { transform:rotate(360deg); }
        }

        .note {
            text-align:center;
            margin-top:25px;
            font-size:14px;
            color:#555;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>✍️ Scriere Tag NFC</h1>

        <div class="card">

            <p style="font-size:18px; font-weight:600;">
                Introdu textul pentru tag:
            </p>

            <textarea id="nfcText" rows="3" placeholder="Ex: HAM_001, LOC_Magazin, KIT_015"></textarea>

            <button id="writeButton" class="btn btn-green">
                ✅ Scrie pe tag
            </button>

            <button id="eraseButton" class="btn btn-red">
                🧹 Șterge tag-ul
            </button>

            <a href="index.html">
                <button class="btn btn-gray">⬅ Înapoi</button>
            </a>

        </div>

        <div id="statusBox"></div>

        <p class="note">
            *Scrierea NFC funcționează doar pe Android + Chrome*
        </p>

    </div>

    <!-- ✅ SCRIPT WRITE.JS (FUNCȚIONEAZĂ ACUM) -->
    <script src="write.js"></script>

    <script>
    /* ✅ Adăugăm loader animat la scriere */
    document.getElementById("writeButton").addEventListener("click", () => {
        statusBox.innerHTML = `
            <div class="loader"></div>
            Apropie telefonul de tag...
        `;
    });

    document.getElementById("eraseButton").addEventListener("click", () => {
        statusBox.innerHTML = `
            <div class="loader"></div>
            Ștergere tag...
        `;
    });
    </script>

</body>
</html>
