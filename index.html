<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Scan</title>

    <!-- Elimină eroarea favicon 404 -->
    <link rel="icon" href="data:,">

<style>
/* ✅ FUNDAL ANIMAT PREMIUM */
body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(135deg,#ffffff,#e8e8ff,#c7ccff,#b79dff,#7e67ff);
    background-size:400% 400%;
    animation:bg 18s ease infinite;
    min-height:100vh;
    padding-bottom:40px;
    overflow-x:hidden;
}
@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{max-width:650px;margin:auto;padding:20px}

/* ✅ HEADER PREMIUM */
.top-card{
    background:rgba(255,255,255,.2);
    padding:28px 20px;
    border-radius:28px;
    margin-top:25px;
    text-align:center;
    backdrop-filter:blur(16px);
    box-shadow:0 12px 30px rgba(0,0,0,.18);
    animation:fadeDown .45s ease-out;
}
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-20px)}
    to{opacity:1; transform:translateY(0)}
}
.top-card img{
    width:140px;
    margin-bottom:10px;
}
.top-title{
    margin:0;
    font-size:40px;
    font-weight:900;
    color:#1d4ed8;
    text-shadow:0 0 12px rgba(255,255,255,.9);
}

/* ✅ CARD PRINCIPAL */
.card{
    background:rgba(255,255,255,.85);
    padding:28px;
    border-radius:26px;
    box-shadow:0 15px 38px rgba(0,0,0,.18);
    margin-top:35px;
    backdrop-filter:blur(14px);
    animation:slideUp .35s ease-out;
}
@keyframes slideUp{
    from{opacity:0; transform:translateY(25px)}
    to{opacity:1; transform:translateY(0)}
}

#locatie{color:#16a34a;font-weight:bold}

/* ✅ SCAN NFC FLOATING BUTTON */
.fab-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
}
.fab-nfc{
    width:135px;height:135px;
    border-radius:50%;
    border:none;
    font-size:60px;
    color:white;
    background:radial-gradient(circle,#4F46E5,#312E81);
    display:flex;justify-content:center;align-items:center;
    cursor:pointer;
    box-shadow:0 0 38px rgba(79,70,229,.6);
    animation:floating 2.3s infinite ease-in-out;
}
@keyframes floating{
    0%{transform:scale(1) translateY(0)}
    50%{transform:scale(1.08) translateY(-6px)}
    100%{transform:scale(1) translateY(0)}
}
.fab-label{
    margin-top:12px;
    font-size:20px;
    font-weight:800;
    color:#312E81;
}

/* ✅ CARD-BUTTONS PREMIUM */
.card-btn{
    width:100%;
    padding:18px;
    border-radius:20px;
    margin-top:18px;
    text-align:center;
    color:white;
    font-size:20px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 8px 22px rgba(0,0,0,.15);
    transition:.15s ease;
}
.card-btn:hover{transform:scale(1.03)}
.card-btn:active{transform:scale(.92)}

.blue-btn{background:#1e40af}
.green-btn{background:#16a34a}
.yellow-btn{background:#f59e0b}
.red-btn{background:#dc2626}

/* ✅ SECȚIUNE */
.section-title{
    margin-top:35px;
    font-size:22px;
    font-weight:900;
    color:white;
    text-shadow:0 0 8px rgba(0,0,0,.25);
}

/* ✅ CARD ECHIPAMENTE */
.equip-card{
    background:white;
    padding:16px;
    margin-top:16px;
    border-radius:16px;
    border-left:6px solid #1d4ed8;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
    animation:slideUp .3s ease-out;
}
.conform{box-shadow:0 0 16px rgba(22,163,74,.6)}
.neconform{box-shadow:0 0 16px rgba(220,38,38,.6)}

/* ✅ POPUP */
#popup-bg{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(6px);
}
#popup{
    background:rgba(255,255,255,.6);
    padding:25px;
    border-radius:24px;
    width:90%;max-width:430px;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
    backdrop-filter:blur(15px);
    animation:fadeIn .3s ease-out;
}

.cn-buttons{display:flex;gap:20px;margin-top:20px}
.cn-buttons button{
    width:45%;
    padding:16px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:20px;
    font-weight:800;
    cursor:pointer;
}

/* ✅ FULLSCREEN FOTO */
#fullscreen-bg{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}
#fullscreen-img{
    max-width:92%;max-height:92%;
    border-radius:16px;
}
</style>
</head>

<body>

<div class="container">

    <!-- ✅ HEADER LOGO FIX -->
    <div class="top-card">
 dpw.png
        <h1 class="top-title">NFC Scan</h1>
    </div>

    <!-- ✅ CARD PRINCIPAL -->
    <div class="card">

        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <div class="fab-wrap">
            <button id="scanNFC" class="fab-nfc">📡</button>
            <div class="fab-label">Scan NFC</div>
        </div>

        <!-- ✅ LINK CORECT (NU TEXT!) -->
index.html<button class="card-btn green-btn">✍️ Scrie NFC</button></a>

        <p id="scanStatus" style="display:none;text-align:center;font-weight:800;color:#1d4ed8;">
            🔎 Apropie telefonul de tag...
        </p>

    </div>

    <!-- ✅ SECȚIUNE ECHIPAMENTE -->
    <h2 class="section-title">Echipamente scanate</h2>

    <div id="lista"></div>

    <button id="showHistory" class="card-btn blue-btn">📜 Arată istoricul</button>
    <button id="exportCSV" class="card-btn yellow-btn">📁 Exportă în Excel</button>
    <button id="clearData" class="card-btn red-btn">🗑️ Șterge afișarea locală</button>

</div>

<!-- ✅ POPUP -->
<div id="popup-bg">
    <div id="popup">

        <h3 style="text-align:center;font-size:26px;color:#1d4ed8;font-weight:900;">
            Echipamentul este conform?
        </h3>

        <div class="cn-buttons">
            <button id="btn-conform" style="background:#16a34a;">✅ Conform</button>
            <button id="btn-neconform" style="background:#dc2626;">❌ Neconform</button>
        </div>

        <div id="popup-observatii" style="display:none; margin-top:20px;">

            <textarea id="obs-text" placeholder="Introduceți observațiile..." style="width:100%;padding:14px;border-radius:16px;"></textarea>

            <button id="btn-photo" class="card-btn blue-btn" style="margin-top:15px;">
                📸 Adaugă fotografie
            </button>

            <label style="opacity:0;position:absolute;">
                <input type="file" id="photo-input" accept="image/*" capture="environment">
            </label>

            <img id="photo-preview" style="display:none;width:100%;margin-top:12px;border-radius:16px;">

            <button id="btn-delete-photo"
                style="display:none;width:100%;margin-top:12px;padding:16px;background:#dc2626;border:none;border-radius:16px;color:white;font-size:19px;font-weight:800;">
                🗑️ Șterge fotografia
            </button>

            <div id="loader"
                style="display:none;text-align:center;margin-top:12px;color:#1d4ed8;font-weight:800;">
                ⏳ Se încarcă...
            </div>

            <button id="btn-save-obs"
                style="width:100%;margin-top:20px;padding:16px;background:#1e40af;border:none;border-radius:18px;color:white;font-size:20px;font-weight:900;">
                💾 Salvează
            </button>

        </div>
    </div>
</div>

<!-- ✅ FULLSCREEN FOTO -->
<div id="fullscreen-bg">
    <img id="fullscreen-img">
</div>

<script>
document.getElementById("photo-preview").onclick=()=>{
 const full=document.getElementById("fullscreen-bg");
 const img=document.getElementById("fullscreen-img");
 img.src=document.getElementById("photo-preview").src;
 full.style.display="flex";
};
document.getElementById("fullscreen-bg").onclick=()=>{
 document.getElementById("fullscreen-bg").style.display="none";
};
document.getElementById("btn-delete-photo").onclick=()=>{
 document.getElementById("photo-preview").style.display="none";
 document.getElementById("btn-delete-photo").style.display="none";
 document.getElementById("photo-input").value="";
};
</script>

<script src="app.js"></script>

<script>
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
