<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSE NFC Scan</title>

    <style>
        /* ✅ FUNDAL degrade alb-gri-albastru-mov, bine amestecat */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(
                145deg,
                #ffffff 0%,
                #e9e9e9 20%,
                #cdd8ff 45%,
                #b0b3ff 65%,
                #8d7aff 100%
            );
            background-attachment: fixed;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 20px;
        }

        /* ✅ Logo + Titlu */
        h1 {
            text-align: center;
            font-size: 36px;
            color: #1d4ed8;
            font-weight: 700;
            display:flex;
            justify-content:center;
            align-items:center;
            gap: 22px;
            margin-bottom: 30px;
        }

        h1 img {
            width: 100px;
            height:auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.10);
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px 0;
            color: white;
            font-weight: 600;
        }

        .btn-blue { background: #1d4ed8; }
        .btn-blue2 { background: #1e40af; }
        .btn-green { background: #16a34a; }
        .btn-red { background: #dc2626; }
        .btn-red2 { background:#dc2626; }
        .btn-yellow { background:#f59e0b; }

        #locatie {
            color: #16a34a;
            font-weight: bold;
            font-size: 18px;
        }

        /* ✅ Popup */
        #popup-bg {
            display:none;
            position:fixed;
            top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        /* ✅ Popup scrollabil și vizibil integral */
        #popup {
            background:white;
            padding:20px;
            border-radius:16px;
            width:90%;
            max-width:420px;
            max-height:80vh;
            overflow-y:auto;
            box-shadow:0 4px 20px rgba(0,0,0,0.25);
            animation: fadeIn .2s ease-out;
        }

        #popup button {
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            margin-top:10px;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
        }

        /* ✅ Preview foto */
        #photo-preview {
            display:none;
            width:100%;
            border-radius:12px;
            margin-top:12px;
            cursor:pointer;
        }

        /* ✅ FULLSCREEN FOTO */
        #fullscreen-bg {
            display:none;
            position:fixed;
            top:0; left:0; width:100%; height:100%;
            background:black;
            justify-content:center;
            align-items:center;
            z-index:10000;
        }

        #fullscreen-img {
            max-width:100%;
            max-height:100%;
        }

        /* ✅ LOADER */
        #loader {
            display:none;
            text-align:center;
            font-size:20px;
            margin-top:10px;
            color:#1d4ed8;
            font-weight:bold;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:scale(.92);}
            to {opacity:1; transform:scale(1);}
        }
    </style>
</head>

<body>

<div class="container">

    <h1>
        <img src="dpw.png">
        HSE NFC Scan
    </h1>

    <div class="card">
        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <button id="scanNFC" class="btn btn-blue">📡 Scanează NFC</button>

        <a href="write.html">
            <button class="btn btn-green">✍️ Scrie NFC</button>
        </a>

        <p id="scanStatus"
           style="display:none; text-align:center; font-weight:bold; color:#1d4ed8; font-size:18px;"
           class="pulse">
            🔎 Apropie telefonul de tag...
        </p>
    </div>

    <h2 style="font-size:22px; margin-top:25px; color:white;">Echipamente scanate:</h2>
    <div id="lista"></div>

    <button id="showHistory" class="btn btn-blue" style="margin-top:20px;">
        📜 Arată istoricul echipamentului
    </button>

    <div id="istoric" class="card" style="display:none; margin-top:15px;">
        <h3 style="margin-top:0;">Istoric echipament</h3>
        <div id="istoricContent"></div>
    </div>

    <button id="exportCSV" class="btn btn-yellow">📁 Exportă în Excel (CSV)</button>
    <button id="clearData" class="btn btn-red">🗑️ Șterge afișarea locală</button>

</div>

<!-- ✅ POPUP FOTO NEconform -->
<div id="popup-bg">
    <div id="popup">

        <h3 style="text-align:center; font-size:22px; color:#1d4ed8;">
            Echipamentul este conform?
        </h3>

        <button id="btn-conform" class="btn-green">✅ Conform</button>
        <button id="btn-neconform" class="btn-red2">❌ Neconform</button>

        <div id="popup-observatii" style="display:none; margin-top:12px;">

            <textarea id="obs-text" rows="4"
                      placeholder="Introduceți observațiile..."
                      style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"></textarea>

            <!-- ✅ Buton FOTO -->
            <button id="btn-photo" class="btn-blue2">📸 Adaugă fotografie (opțional)</button>

            <!-- ✅ Input foto (fix Android) -->
            <label style="opacity:0; position:absolute; left:-9999px;">
                <input type="file" id="photo-input" accept="image/*" capture="environment">
            </label>

            <!-- ✅ Previzualizare mică -->
            <img id="photo-preview">

            <!-- ✅ Buton Șterge poză -->
            <button id="btn-delete-photo" class="btn-red2" style="display:none;">🗑️ Șterge fotografia</button>

            <!-- ✅ Loader upload -->
            <div id="loader">⏳ Se încarcă fotografia...</div>

            <!-- ✅ Salvare -->
            <button id="btn-save-obs" class="btn-blue2">💾 Salvează</button>

        </div>

    </div>
</div>

<!-- ✅ FULLSCREEN FOTO -->
<div id="fullscreen-bg">
    <img id="fullscreen-img">
</div>

<script src="app.js"></script>

<script>
/* ✅ Fullscreen Foto */
document.getElementById("photo-preview").onclick = () => {
    const full = document.getElementById("fullscreen-bg");
    const img = document.getElementById("fullscreen-img");
    img.src = document.getElementById("photo-preview").src;
    full.style.display = "flex";
};

document.getElementById("fullscreen-bg").onclick = () => {
    document.getElementById("fullscreen-bg").style.display = "none";
};

/* ✅ Delete Photo */
document.getElementById("btn-delete-photo").onclick = () => {
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btn-delete-photo").style.display = "none";
    document.getElementById("photo-input").value = "";
};
</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
