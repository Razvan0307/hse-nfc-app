<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Scan</title>
    

<style>
/* ✅ FUNDAL ANIMAT PREMIUM */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg,#ffffff,#e8e8ff,#c7ccff,#b79dff,#7e67ff);
    background-size: 400% 400%;
    animation: bgMove 18s ease infinite;
    min-height: 100vh;
    padding-bottom: 40px;
    overflow-x: hidden;
}
@keyframes bgMove {
    0% {background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container {
    max-width: 650px;
    margin:auto;
    padding:20px;
}

/* ✅ HEADER PREMIUM TOP CARD */
.top-card {
    background: rgba(255,255,255,0.22);
    border-radius:28px;
    padding:28px 20px;
    text-align:center;
    backdrop-filter:blur(18px);
    box-shadow:0 12px 32px rgba(0,0,0,0.18);
    animation: fadeDown .5s ease-out;
    margin-top:25px;
}
@keyframes fadeDown {
    from {opacity:0; transform:translateY(-25px);}
    to   {opacity:1; transform:translateY(0);}
}
.top-card img {
    width:150px;
    margin-bottom:12px;
}
.top-title {
    margin: 0;
    font-size:40px;
    font-weight:900;
    color:#1d4ed8;
    text-shadow:0 0 12px rgba(255,255,255,0.9);
}

/* ✅ CARD PRINCIPAL DP WORLD STYLE */
.card {
    background: rgba(255,255,255,0.80);
    padding: 28px;
    border-radius: 28px;
    box-shadow: 0 15px 38px rgba(0,0,0,0.18);
    margin-top:30px;
    backdrop-filter: blur(14px);
    animation: slideUp .35s ease-out;
}
@keyframes slideUp {
    from {opacity:0; transform: translateY(30px);}
    to   {opacity:1; transform: translateY(0);}
}

#locatie {
    color:#16a34a;
    font-weight:700;
}

/* ✅ FAB – FLOATING NFC BUTTON */
.fab-wrapper {
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:25px;
}

.fab-nfc {
    width:135px;
    height:135px;
    border-radius:50%;
    border:none;
    font-size:62px;
    background: radial-gradient(circle,#4F46E5,#312E81);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 0 40px rgba(79,70,229,0.6);
    animation:floating 2.4s infinite ease-in-out;
}
@keyframes floating {
    0% {transform:scale(1) translateY(0);}
    50%{transform:scale(1.08) translateY(-6px);}
    100%{transform:scale(1) translateY(0);}
}

.fab-label {
    margin-top:12px;
    font-size:22px;
    font-weight:800;
    color:#4338CA;
}

/* ✅ BUTOANE PREMIUM (card style) */
.card-btn {
    width:100%;
    padding:18px;
    margin-top:18px;
    border-radius:22px;
    font-size:20px;
    font-weight:800;
    color:white;
    text-align:center;
    cursor:pointer;
    box-shadow:0 8px 22px rgba(0,0,0,0.15);
    transition:.2s ease;
    animation:fadeIn .3s ease-out;
}
.card-btn:hover {transform:scale(1.03);}
.card-btn:active {transform:scale(.95);}

.blue-btn   {background:#1d4ed8;}
.yellow-btn {background:#f59e0b;}
.red-btn    {background:#dc2626;}
.green-btn  {background:#16a34a;}

/* ✅ TITLU SECȚIUNE */
.section-title {
    margin-top:35px;
    font-size:22px;
    font-weight:900;
    color:white;
    text-shadow:0 0 8px rgba(0,0,0,0.25);
}

/* ✅ CARD-URI SCANATE */
.equip-card {
    background:white;
    padding: 16px;
    margin-top:16px;
    border-radius:16px;
    border-left:6px solid #1d4ed8;
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
    animation: slideUp .35s ease-out;
}
.conform {box-shadow:0 0 16px rgba(22,163,74,0.6);}
.neconform {box-shadow:0 0 16px rgba(220,38,38,0.6);}

/* ✅ PREMIUM SKELETON */
.skeleton-card {
    height:80px;
    border-radius:20px;
    background:linear-gradient(90deg,#e5e5e5,#f5f5f5,#e5e5e5);
    animation:skeletonFlow 1.3s infinite;
    background-size:200% 100%;
    margin-bottom:14px;
}
@keyframes skeletonFlow {
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
}

/* ✅ POPUP */
#popup-bg {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#popup {
    background:rgba(255,255,255,0.6);
    border-radius:25px;
    padding:25px;
    width:90%;
    max-width:430px;
    backdrop-filter:blur(15px);
    box-shadow:0 8px 24px rgba(0,0,0,0.25);
    animation:fadeIn .3s ease-out;
}

.cn-buttons {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.cn-buttons button {
    width:45%;
    padding:16px;
    border:none;
    border-radius:18px;
    font-size:20px;
    font-weight:800;
    cursor:pointer;
    color:white;
}

#obs-text {
    width:100%;
    padding:14px;
    border-radius:16px;
    border:1px solid #ccc;
    resize:none;
    margin-top:12px;
}

#photo-preview {
    display:none;
    width:100%;
    margin-top:12px;
    border-radius:16px;
}

#fullscreen-bg {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
}

/* ✅ FULLSCREEN FOTO */
#fullscreen-img {
    max-width:92%;
    max-height:92%;
    border-radius:16px;
    animation:zoomIn .25s ease-out;
}

@keyframes zoomIn {
    from {opacity:0; transform:scale(.85);}
    to   {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

    <!-- ✅ HEADER PREMIUM -->
    <div class="top-card">
 dpw.png
        <h1 class="top-title">NFC Scan</h1>
    </div>

    <!-- ✅ CARD PRINCIPAL PREMIUM -->
    <div class="card">
        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <div class="fab-wrapper">
            <button id="scanNFC" class="fab-nfc">📡</button>
            <div class="fab-label">Scan NFC</div>
        </div>

        write.html<button class="card-btn green-btn">✍️ Scrie NFC</button>
        </a>

        <p id="scanStatus" style="display:none;text-align:center;font-weight:800;color:#1d4ed8;">
            🔎 Apropie telefonul de tag...
        </p>
    </div>

    <!-- ✅ SECȚIUNE -->
    <h2 class="section-title">Echipamente scanate</h2>

    <div id="lista"></div>

    <div id="showHistory" class="card-btn blue-btn">📜 Arată istoricul</div>
    <div id="exportCSV" class="card-btn yellow-btn">📁 Exportă în Excel</div>
    <div id="clearData" class="card-btn red-btn">🗑️ Șterge afișarea locală</div>

</div>

<!-- ✅ POPUP -->
<div id="popup-bg">
    <div id="popup">

        <h3 style="text-align:center;font-size:26px;color:#1d4ed8;font-weight:900;">
            Echipamentul este conform?
        </h3>

        <div class="cn-buttons">
            <button id="btn-conform" style="background:#16a34a;">✅ Conform</button>
            <button id="btn-neconform" style="background:#dc2626;">❌ Neconform</button>
        </div>

        <div id="popup-observatii" style="display:none; margin-top:20px;">

            <textarea id="obs-text" placeholder="Introduceți observațiile..."></textarea>

            <button id="btn-photo" class="card-btn blue-btn" style="margin-top:15px;">
                📸 Adaugă fotografie
            </button>

            <label style="opacity:0;position:absolute;">
                <input type="file" id="photo-input" accept="image/*" capture="environment">
            </label>

            <img id="photo-preview">

            <button id="btn-delete-photo"
                    style="display:none;width:100%;margin-top:12px;padding:16px;background:#dc2626;border:none;border-radius:16px;color:white;font-size:19px;font-weight:800;">
                🗑️ Șterge fotografia
            </button>

            <div id="loader"
                 style="display:none;text-align:center;margin-top:12px;color:#1d4ed8;font-weight:800;">
                ⏳ Se încarcă...
            </div>

            <button id="btn-save-obs"
                    style="width:100%;margin-top:20px;padding:16px;background:#1e40af;border:none;border-radius:18px;color:white;font-size:20px;font-weight:900;">
                💾 Salvează
            </button>
        </div>

    </div>
</div>

<!-- ✅ FULLSCREEN FOTO -->
<div id="fullscreen-bg">
    <img id="fullscreen-img">
</div>

    const full = document.getElementById("fullscreen-bg");

    full.style.display = "flex";
};
document.getElementById("fullscreen-bg").onclick = () => {
    document.getElementById("fullscreen-bg").style.display = "none";
};
document.getElementById("btn-delete-photo").onclick = () => {
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btn-delete-photo").style.display = "none";
    document.getElementById("photo-input").value = "";
};
</script>
