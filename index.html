<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSE NFC Scan</title>

    <!-- Manifest corect -->
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            margin: 0;
            background: #f0f2f5;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #1d4ed8;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px 0;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-blue { background: #1d4ed8; }
        .btn-blue:hover { background: #1539a3; }

        .btn-yellow { background: #f59e0b; }
        .btn-yellow:hover { background: #d48806; }

        .btn-red { background: #dc2626; }
        .btn-red:hover { background: #a81e1e; }

        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #12832e; }

        #locatie {
            color: #16a34a;
            font-weight: bold;
            font-size: 18px;
        }

        .equip-card {
            background: #ffffff;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border-left: 6px solid #1d4ed8;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }

        .equip-id {
            font-size: 22px;
            font-weight: bold;
            color: #1d4ed8;
        }

        .equip-loc {
            font-size: 19px;
            color: #16a34a;
            margin-top: 4px;
        }

        .equip-time {
            font-size: 15px;
            color: #6b7280;
        }

        .equip-status {
            margin-top: 8px;
            padding: 4px 8px;
            background: #f3f4f6;
            border-radius: 6px;
            display: inline-block;
            color: #444;
            font-size: 15px;
        }

        .pulse {
            animation: pulseAnim 1s infinite;
        }

        @keyframes pulseAnim {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🦺 HSE NFC Scan</h1>

    <div class="card">
        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <button id="scanNFC" class="btn btn-blue">📡 Scanează NFC</button>

        <p id="scanStatus"
           style="display:none; text-align:center; font-weight:bold; color:#1d4ed8; font-size:18px;"
           class="pulse">
            🔎 Apropie telefonul de tag...
        </p>
    </div>

    <button id="showExpired" class="btn btn-green">🔎 Vezi echipamente cu revizie depășită</button>

    <h2 style="font-size:22px; margin-top:25px; color:#333;">Echipamente scanate:</h2>
    <div id="lista"></div>

    <button id="exportCSV" class="btn btn-yellow">📁 Exportă în Excel (CSV)</button>
    <button id="clearData" class="btn btn-red">🗑️ Șterge afișarea locală</button>

</div>

<!-- Script corect încărcat -->
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
