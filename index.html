<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Scan</title>

    <!-- Elimină eroarea favicon -->
    <link rel="icon" href="favicon.ico">

<style>
/* ✅ FUNDAL ANIMAT PREMIUM */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #ffffff, #e8e8ff, #c7ccff, #b79dff, #7e67ff);
    background-size: 400% 400%;
    animation: bgMove 18s ease infinite;
    min-height: 100vh;
    padding-bottom: 40px;
    overflow-x: hidden;
}
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 650px;
    margin: auto;
    padding: 20px;
}

/* ✅ HEADER PREMIUM */
.top-card {
    background: rgba(255,255,255,0.25);
    border-radius: 26px;
    padding: 28px 20px;
    text-align: center;
    backdrop-filter: blur(15px);
    margin-top: 25px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    animation: fadeDown .45s ease-out;
}
@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-25px); }
    to   { opacity: 1; transform: translateY(0); }
}
.top-card img {
    width: 150px;
    margin-bottom: 12px;
}
.top-title {
    margin: 0;
    font-size: 40px;
    font-weight: 900;
    color: #1d4ed8;
    text-shadow: 0 0 12px rgba(255,255,255,0.9);
}

/* ✅ CARD PRINCIPAL MODERN */
.card {
    background: rgba(255,255,255,0.9);
    padding: 22px;
    border-radius: 28px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    margin-top: 35px;
    backdrop-filter: blur(12px);
    animation: slideUp .4s ease-out;
}
@keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
}

#locatie { color:#16a34a; font-weight:bold; }

/* ✅ BUTON SCAN NFC FLOATING */
.fab-wrap {
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
}
.fab-nfc {
    width:130px;
    height:130px;
    border-radius:50%;
    border:none;
    font-size:58px;
    background: radial-gradient(circle, #4F46E5, #312E81);
    color:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 38px rgba(79,70,229,0.6);
    animation: floating 2.4s infinite ease-in-out;
}
@keyframes floating {
    0% { transform:scale(1) translateY(0); }
    50%{ transform:scale(1.08) translateY(-6px); }
    100%{ transform:scale(1) translateY(0); }
}

.fab-label {
    font-size:20px;
    font-weight:800;
    margin-top:12px;
    color:#1d4ed8;
}

/* ✅ BUTOANE PREMIUM */
.card-btn, .btn {
    width: 100%;
    padding: 16px;
    border:none;
    border-radius: 20px;
    font-size:20px;
    color:white;
    font-weight:800;
    cursor:pointer;
    margin-top:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:.15s ease;
}
.card-btn:hover, .btn:hover { transform:scale(1.03); }
.card-btn:active, .btn:active { transform:scale(.94); }

.btn-blue   { background:#1d4ed8; }
.btn-blue2  { background:#1e40af; }
.btn-green  { background:#16a34a; }
.btn-yellow { background:#f59e0b; }
.btn-red    { background:#dc2626; }

/* ✅ SECȚIUNI */
.section-title {
    margin-top:35px;
    font-size:22px;
    font-weight:900;
    color:white;
    text-shadow:0 0 8px rgba(0,0,0,0.25);
}

/* ✅ CARD ECHIPAMENT */
.equip-card {
    background:white;
    padding:16px;
    margin-top:16px;
    border-radius:16px;
    border-left:6px solid #1d4ed8;
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
    animation:slideUp .35s ease-out;
}
.conform { box-shadow:0 0 16px rgba(22,163,74,0.6); }
.neconform { box-shadow:0 0 16px rgba(220,38,38,0.6); }

/* ✅ POPUP */
#popup-bg{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.45);
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(6px);
    z-index:9999;
}
#popup{
    background:rgba(255,255,255,0.55);
    border-radius:25px;
    padding:25px;
    width:90%;
    max-width:430px;
    backdrop-filter:blur(15px);
    animation:fadeIn .3s ease-out;
}
.cn-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}
.cn-buttons button{
    width:45%;
    padding:18px;
    border:none;
    border-radius:18px;
    font-size:22px;
    font-weight:700;
    color:white;
    cursor:pointer;
}
#obs-text{
    width:100%;
    padding:14px;
    border-radius:16px;
    border:1px solid #ccc;
    margin-top:12px;
}
#photo-preview{
    display:none;
    width:100%;
    margin-top:12px;
    border-radius:16px;
}
#fullscreen-bg{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
#fullscreen-img{
    max-width:92%;
    max-height:92%;
    border-radius:16px;
}
</style>
</head>

<body>

<div class="container">

    <!-- ✅ HEADER -->
    <div class="top-card">
        <img src="dpw.png" alt="DPW Logo">
        <h1 class="top-title">NFC Scan</h1>
    </div>

    <!-- ✅ CARD PRINCIPAL -->
    <div class="card">

        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <!-- ✅ FAB BUTTON -->
        <div class="fab-wrap">
            <button id="scanNFC" class="fab-nfc">📡</button>
            <div class="fab-label">Scan NFC</div>
        </div>

        <!-- ✅ LINK CORECT (fără afișare text write.html) -->
        <a href="write.html">
            <button class="btn btn-green">✍️ Scrie NFC</button>
        </a>

        <p id="scanStatus"
           style="display:none;text-align:center;font-weight:800;color:#1d4ed8;">
           🔎 Apropie telefonul de tag...
        </p>

    </div>

    <h2 class="section-title">Echipamente scanate:</h2>

    <div id="lista"></div>

    <button id="showHistory" class="btn btn-blue">📜 Arată istoricul</button>

    <div id="istoric" class="card" style="display:none;">
        <h3>Istoric echipament</h3>
        <div id="istoricContent"></div>
    </div>

    <button id="exportCSV" class="btn btn-yellow">📁 Exportă în Excel</button>
    <button id="clearData" class="btn btn-red">🗑️ Șterge afișarea locală</button>

</div>

<!-- ✅ POPUP -->
<div id="popup-bg">
    <div id="popup">

        <h3 style="text-align:center;font-size:26px;font-weight:900;color:#1d4ed8;">
            Echipamentul este conform?
        </h3>

        <div class="cn-buttons">
            <button id="btn-conform" style="background:#16a34a;">✅ Conform</button>
            <button id="btn-neconform" style="background:#dc2626;">❌ Neconform</button>
        </div>

        <div id="popup-observatii" style="display:none; margin-top:20px;">

            <textarea id="obs-text" placeholder="Introduceți observațiile..."></textarea>

            <button id="btn-photo" class="btn btn-blue2" style="margin-top:15px;">
                📸 Adaugă fotografie
            </button>

            <label style="opacity:0;position:absolute;">
                <input type="file" id="photo-input" accept="image/*" capture="environment">
            </label>

            <img id="photo-preview">

            <button id="btn-delete-photo"
                style="display:none;width:100%;margin-top:12px;padding:16px;background:#dc2626;border:none;color:white;border-radius:16px;font-weight:800;">
                🗑️ Șterge fotografia
            </button>

            <div id="loader"
                style="display:none;text-align:center;margin-top:12px;color:#1d4ed8;font-weight:800;">
                ⏳ Se încarcă...
            </div>

            <button id="btn-save-obs"
                style="width:100%;margin-top:20px;padding:16px;background:#1e40af;border:none;color:white;border-radius:18px;font-size:20px;font-weight:900;">
                💾 Salvează
            </button>

        </div>
    </div>
</div>

<!-- ✅ FULLSCREEN FOTO -->
<div id="fullscreen-bg">
    <img id="fullscreen-img">
</div>

<script>
document.getElementById("photo-preview").onclick = () => {
    const full = document.getElementById("fullscreen-bg");
    const img = document.getElementById("fullscreen-img");
    img.src = document.getElementById("photo-preview").src;
    full.style.display = "flex";
};
document.getElementById("fullscreen-bg").onclick = () => {
    document.getElementById("fullscreen-bg").style.display = "none";
};
document.getElementById("btn-delete-photo").onclick = () => {
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btn-delete-photo").style.display = "none";
    document.getElementById("photo-input").value = "";
};
</script>

<!-- ✅ CORECTAȚI: NU MAI APARE CA TEXT -->
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
