<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Scan</title>

    <!-- ✅ Elimină definitiv eroarea favicon.ico 404 -->
    <link rel="icon" href="data:,">

    <style>
        /* ✅ FUNDAL ANIMAT PREMIUM */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg,#ffffff,#e8e8ff,#c7ccff,#b79dff,#7e67ff);
            background-size: 400% 400%;
            animation: bgFlow 18s ease infinite;
            min-height: 100vh;
            padding-bottom: 40px;
            overflow-x: hidden;
        }
        @keyframes bgFlow {
            0% {background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container {
            max-width:650px;
            margin:auto;
            padding:20px;
        }

        /* ✅ HEADER PREMIUM (logo + titlu într-un top-card) */
        .top-card {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(16px);
            padding: 28px 20px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
            margin-top:30px;
            animation: fadeDown .45s ease-out;
        }
        .top-card img {
            width:150px;
            margin-bottom:14px;
        }
        @keyframes fadeDown {
            from {opacity:0; transform:translateY(-25px);}
            to   {opacity:1; transform:translateY(0);}
        }
        .top-title {
            font-size:40px;
            font-weight:900;
            color:#1d4ed8;
            margin:0;
            text-shadow:0 0 12px rgba(255,255,255,0.85);
        }

        /* ✅ CARD PRINCIPAL – DP World Style */
        .main-card {
            background: rgba(255,255,255,0.78);
            padding: 32px;
            border-radius: 28px;
            box-shadow: 0 15px 38px rgba(0,0,0,0.18);
            margin-top:35px;
            animation: slideUp .35s ease-out;
            backdrop-filter: blur(14px);
        }
        @keyframes slideUp {
            from {opacity:0; transform:translateY(30px);}
            to   {opacity:1; transform:translateY(0);}
        }

        #locatie {
            color:#16a34a;
            font-weight:700;
        }

        /* ✅ FAB – Floating Scan NFC */
        .fab-wrapper {
            display:flex;
            flex-direction:column;
            align-items:center;
            margin-top:25px;
        }
        .fab-nfc {
            width:135px;
            height:135px;
            border-radius:50%;
            background: radial-gradient(circle,#4F46E5,#312E81);
            border:none;
            color:white;
            font-size:62px;
            cursor:pointer;
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 0 40px rgba(79,70,229,0.6);
            animation:floating 2.3s infinite ease-in-out;
        }
        @keyframes floating {
            0%   {transform:scale(1) translateY(0);}
            50%  {transform:scale(1.08) translateY(-6px);}
            100% {transform:scale(1) translateY(0);}
        }
        .fab-label {
            margin-top:14px;
            font-size:22px;
            font-weight:800;
            color:#312E81;
        }

        /* ✅ CARD-BUTTONS PREMIUM */
        .card-btn {
            padding:18px;
            border-radius:22px;
            margin-top:18px;
            font-size:20px;
            font-weight:800;
            color:white;
            text-align:center;
            cursor:pointer;
            box-shadow:0 8px 25px rgba(0,0,0,0.16);
            transition:.15s ease;
            animation: fadeIn .35s ease-out;
        }
        .card-btn:hover {transform:scale(1.03);}
        .card-btn:active {transform:scale(.95);}

        .blue-btn   {background:#1e40af;}
        .yellow-btn {background:#f59e0b;}
        .red-btn    {background:#dc2626;}

        /* ✅ TITLURI SECȚIUNI */
        .section-title {
            margin-top:40px;
            margin-bottom:10px;
            font-size:22px;
            font-weight:900;
            color:white;
            text-shadow:0 0 8px rgba(0,0,0,0.25);
        }

        /* ✅ CARD-URI SCANATE */
        .equip-card {
            background:white;
            padding:18px;
            margin-top:15px;
            border-radius:16px;
            border-left:6px solid #1d4ed8;
            box-shadow:0 6px 16px rgba(0,0,0,0.15);
            animation: slideUp .3s ease-out;
        }
        .conform {box-shadow:0 0 16px rgba(22,163,74,0.6);}
        .neconform{box-shadow:0 0 16px rgba(220,38,38,0.6);}

        /* ✅ SKELETON LOADING */
        .skeleton-card {
            height:80px;
            border-radius:18px;
            background: linear-gradient(90deg,#eaeaea,#f5f5f5,#eaeaea);
            background-size:200% 100%;
            animation: skeletonMove 1.3s infinite;
            margin-bottom:14px;
        }
        @keyframes skeletonMove {
            0% {background-position:200% 0;}
            100%{background-position:-200% 0;}
        }

        /* ✅ POPUP */
        #popup-bg {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.45);
            backdrop-filter:blur(6px);
            justify-content:center;
            align-items:center;
            z-index:9999;
        }
        #popup {
            background:rgba(255,255,255,0.6);
            border-radius:24px;
            padding:25px;
            width:90%;
            max-width:420px;
            box-shadow:0 8px 25px rgba(0,0,0,0.25);
            animation:fadeIn .3s ease-out;
            backdrop-filter:blur(14px);
        }
        @keyframes fadeIn {from {opacity:0;} to {opacity:1;}}

        .cn-buttons {
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:20px;
        }
        .cn-buttons button {
            width:45%;
            padding:16px;
            border:none;
            border-radius:18px;
            cursor:pointer;
            color:white;
            font-size:20px;
            font-weight:800;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ✅ HEADER PREMIUM -->
    <div class="top-card">
 dpw.png
        <h1 class="top-title">NFC Scan</h1>
    </div>

    <!-- ✅ CARD PRINCIPAL -->
    <div class="main-card">
        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <div class="fab-wrapper">
            <button id="scanNFC" class="fab-nfc">📡</button>
            <div class="fab-label">Scan NFC</div>
        </div>

        index.html
            <button class="card-btn blue-btn">✍️ Scrie NFC</button>
        </a>

        <p id="scanStatus" style="display:none; text-align:center; font-weight:800; color:#1d4ed8;">
            🔎 Apropie telefonul de tag...
        </p>
    </div>

    <!-- ✅ SECȚIUNE: Echipamente scanate -->
    <h2 class="section-title">Echipamente scanate</h2>

    <div id="lista"></div>

    <div id="showHistory" class="card-btn blue-btn">📜 Arată istoricul</div>
    <div id="exportCSV" class="card-btn yellow-btn">📁 Exportă în Excel</div>
    <div id="clearData" class="card-btn red-btn">🗑️ Șterge afișarea locală</div>

</div>

<!-- ✅ POPUP -->
<div id="popup-bg">
    <div id="popup">

        <h3 style="text-align:center; font-size:26px; font-weight:900; color:#1d4ed8;">
            Echipamentul este conform?
        </h3>

        <div class="cn-buttons">
            <button id="btn-conform" style="background:#16a34a;">✅ Conform</button>
            <button id="btn-neconform" style="background:#dc2626;">❌ Neconform</button>
        </div>

        <div id="popup-observatii" style="display:none; margin-top:20px;">

            <textarea id="obs-text"
                      style="width:100%; padding:14px; border-radius:16px; border:1px solid #ccc; font-size:17px;"
                      placeholder="Introduceți observațiile..."></textarea>

            <button id="btn-photo" class="card-btn blue-btn" style="margin-top:15px;">
                📸 Adaugă fotografie
            </button>

            <label style="opacity:0; position:absolute;">
                <input type="file" id="photo-input" accept="image/*" capture="environment">
            </label>

            <img id="photo-preview" style="display:none; width:100%; margin-top:12px; border-radius:16px;">

            <button id="btn-delete-photo"
                    style="display:none; width:100%; margin-top:12px; padding:16px; background:#dc2626; border:none; border-radius:16px; color:white; font-size:19px;">
                🗑️ Șterge fotografia
            </button>

            <div id="loader"
                 style="display:none; text-align:center; margin-top:14px; color:#1d4ed8; font-weight:800;">
                ⏳ Se încarcă...
            </div>

            <button id="btn-save-obs"
                    style="width:100%; margin-top:20px; padding:16px; background:#1e40af; border:none; border-radius:18px; font-size:20px; font-weight:900; color:white;">
                💾 Salvează
            </button>
        </div>

    </div>
</div>

<!-- ✅ FULLSCREEN FOTO -->
<div id="fullscreen-bg" style="display:none;">
    <img id="fullscreen-img">
</div>

<script>
document.getElementById("photo-preview").onclick = () => {
    const modal = document.getElementById("fullscreen-bg");
    document.getElementById("fullscreen-img").src =
        document.getElementById("photo-preview").src;
    modal.style.display = "flex";
};

document.getElementById("fullscreen-bg").onclick = () => {
    document.getElementById("fullscreen-bg").style.display = "none";
};

document.getElementById("btn-delete-photo").onclick = () => {
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btn-delete-photo").style.display = "none";
    document.getElementById("photo-input").value = "";
};
</script>

app.js</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
