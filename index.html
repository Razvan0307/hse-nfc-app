<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Scan</title>

    <style>
        /* ✅ FUNDAL ANIMAT SUPER PREMIUM */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff, #e8e8ff, #c7ccff, #b79dff, #7e67ff);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 20px;
        }

        /* ✅ TITLU */
        h1 {
            text-align: center;
            font-size: 36px;
            color: #1d4ed8;
            font-weight: 700;
            display:flex;
            justify-content:center;
            align-items:center;
            gap: 22px;
            margin-bottom: 35px;
        }

        h1 img {
            width: 90px;
        }

        /* ✅ CARD GENERAL */
        .card {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            margin-bottom: 22px;
            animation: fadeIn 0.4s ease-out;
            backdrop-filter: blur(10px);
        }

        /* ✅ CARD-URI ECHIPAMENTE CU ANIMAȚIE */
        .equip-card {
            background: white;
            padding: 16px;
            margin-top: 16px;
            border-radius: 14px;
            border-left: 6px solid #1d4ed8;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity:0; transform: translateY(15px); }
            to   { opacity:1; transform: translateY(0); }
        }

        /* ✅ GLOW pentru conforme/neconforme */
        .equip-card.conform { box-shadow: 0 0 15px rgba(22,163,74,0.6); }
        .equip-card.neconform { box-shadow: 0 0 15px rgba(220,38,38,0.6); }

        /* ✅ BUTOANE */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px 0;
            color: white;
            font-weight: 600;
        }

        .btn-blue { background: #1d4ed8; }
        .btn-blue2 { background: #1e40af; }
        .btn-green { background: #16a34a; }
        .btn-yellow { background:#f59e0b; }
        .btn-red { background: #dc2626; }
        .btn-red2 { background:#b91c1c; }

        #locatie { color: #16a34a; font-weight: bold; font-size: 18px; }

        /* ✅ POPUP STIL iOS (GLASS) */
        #popup-bg {
            display:none;
            position:fixed;
            top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        #popup {
            background: rgba(255,255,255,0.65);
            border:1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(18px);
            padding:22px;
            border-radius:20px;
            width:90%;
            max-width:430px;
            max-height:80vh;
            overflow-y:auto;
            box-shadow:0 8px 25px rgba(0,0,0,0.25);
            animation: fadeIn .2s ease-out;
        }

        /* ✅ FOTO PREVIEW */
        #photo-preview {
            display:none;
            width:100%;
            margin-top:12px;
            border-radius:12px;
            cursor:pointer;
            box-shadow:0 3px 10px rgba(0,0,0,0.25);
        }

        /* ✅ FULLSCREEN FOTO ANIMAT */
        #fullscreen-bg {
            display:none;
            position:fixed;
            top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.9);
            justify-content:center;
            align-items:center;
            z-index:10000;
            animation: fadeIn 0.3s ease-out;
        }

        #fullscreen-img {
            max-width:100%;
            max-height:100%;
            border-radius:12px;
            animation: zoomIn 0.25s ease-out;
        }

        @keyframes zoomIn {
            from { opacity:0; transform: scale(0.85); }
            to   { opacity:1; transform: scale(1); }
        }

        /* ✅ SKELETON LOADING */
        .skeleton {
            height: 80px;
            background: linear-gradient(90deg, #e4e4e4, #f3f3f3, #e4e4e4);
            background-size: 200% 100%;
            animation: skeletonMove 1.5s infinite;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        @keyframes skeletonMove {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ✅ ANIMAȚIE GENERALA */
        @keyframes fadeIn {
            from {opacity:0;}
            to {opacity:1;}
        }
    </style>
</head>

<body>

<div class="container">

    <h1>
        <img src="dpw.png" alt="DPW">
        NFC Scan
    </h1>

    <div class="card">
        <p><strong>Locația curentă:</strong> <span id="locatie">Nesetat</span></p>

        <!-- ✅ FAB BUTTON – CENTRAT SUB CARD -->
        <button id="scanNFC" class="btn btn-blue" 
            style="border-radius:50px; width:70%; margin-left:15%; box-shadow:0 0 20px rgba(29,78,216,0.5); font-size:22px;">
            📡 Scanează NFC
        </button>

        <a href="write.html">
            <button class="btn btn-green">✍️ Scrie NFC</button>
        </a>

        <p id="scanStatus" style="display:none; text-align:center; font-weight:bold; color:#1d4ed8; font-size:18px;"
           class="pulse">🔎 Apropie telefonul de tag...</p>
    </div>

    <h2 style="font-size:22px; margin-top:25px; color:white;">Echipamente scanate:</h2>
    <div id="lista"></div>

    <button id="showHistory" class="btn btn-blue" style="margin-top:20px;">
        📜 Arată istoricul echipamentului
    </button>

    <div id="istoric" class="card" style="display:none; margin-top:15px;">
        <h3 style="margin-top:0;">Istoric echipament</h3>
        <div id="istoricContent"></div>
    </div>

    <button id="exportCSV" class="btn btn-yellow">📁 Exportă în Excel (CSV)</button>
    <button id="clearData" class="btn btn-red">🗑️ Șterge afișarea locală</button>

</div>

<!-- ✅ POPUP NEconform -->
<div id="popup-bg">
    <div id="popup">

        <h3 style="text-align:center; font-size:22px; color:#1d4ed8;">Echipamentul este conform?</h3>

        <button id="btn-conform" class="btn-green">✅ Conform</button>
        <button id="btn-neconform" class="btn-red2">❌ Neconform</button>

        <div id="popup-observatii" style="display:none; margin-top:12px;">

            <textarea id="obs-text" rows="4"
                      placeholder="Introduceți observațiile..."
                      style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"></textarea>

            <!-- FOTO -->
            <button id="btn-photo" class="btn-blue2">📸 Adaugă fotografie (opțional)</button>

            <label style="opacity:0; position:absolute; left:-9999px;">
                <input type="file" id="photo-input" accept="image/*" capture="environment">
            </label>

            <img id="photo-preview">

            <button id="btn-delete-photo" class="btn-red2" style="display:none;">
                🗑️ Șterge fotografia
            </button>

            <div id="loader">⏳ Se încarcă fotografia...</div>

            <button id="btn-save-obs" class="btn-blue2">💾 Salvează</button>
        </div>

    </div>
</div>

<!-- ✅ FULLSCREEN FOTO -->
<div id="fullscreen-bg">
    <img id="fullscreen-img">
</div>

<script>
document.getElementById("photo-preview").onclick = () => {
    const full = document.getElementById("fullscreen-bg");
    const img = document.getElementById("fullscreen-img");
    img.src = document.getElementById("photo-preview").src;
    full.style.display = "flex";
};

document.getElementById("fullscreen-bg").onclick = () => {
    document.getElementById("fullscreen-bg").style.display = "none";
};

document.getElementById("btn-delete-photo").
onclick = () => {
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btn-delete-photo").style.display = "none";
    document.getElementById("photo-input").value = "";
};
</script>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
